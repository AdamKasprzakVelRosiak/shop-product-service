spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://localhost:5432/shop
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: product
        format_sql: true

server:
  port: 8081