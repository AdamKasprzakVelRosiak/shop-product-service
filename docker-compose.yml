services:
  postgres:
    image: postgres:16
    container_name: shop-product-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - shop-product-pgdata:/var/lib/postgresql/data

volumes:
  shop-product-pgdata:
